name: Create GitHub Issues from Test Results

on:
  workflow_dispatch:
  push:
    paths:
      - 'github-issues/**'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read and create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const issuesDir = './github-issues';
            if (!fs.existsSync(issuesDir)) {
              console.log('No github-issues directory found');
              return;
            }
            
            // 获取已存在的 issues 标题
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const existingTitles = existingIssues.data.map(i => i.title);
            
            // 读取所有 issue 文件
            const files = fs.readdirSync(issuesDir).filter(f => f.endsWith('.md') && !f.includes('SUMMARY'));
            
            for (const file of files) {
              const content = fs.readFileSync(path.join(issuesDir, file), 'utf8');
              
              // 解析标题
              const titleMatch = content.match(/^## .+? (.+)$/m);
              if (!titleMatch) continue;
              
              const title = titleMatch[1].trim();
              
              // 检查是否已存在
              if (existingTitles.some(t => t.includes(title.substring(0, 50)))) {
                console.log(`Issue already exists: ${title}`);
                continue;
              }
              
              // 解析标签
              const severityMatch = content.match(/\*\*严重程度:\*\* (\w+)/);
              const categoryMatch = content.match(/\*\*类别:\*\* (\w+)/);
              
              const labels = [];
              if (severityMatch) labels.push(severityMatch[1].toLowerCase());
              if (categoryMatch) labels.push(categoryMatch[1].toLowerCase());
              labels.push('automated');
              
              // 创建 issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: content,
                labels: labels
              });
              
              console.log(`Created issue: ${title}`);
            }
